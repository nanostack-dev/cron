version: "2"
linters:
  default: standard
  enable:
    - errorlint
    - misspell
    - unconvert
  exclusions:
    rules:
      # Upstream tests intentionally ignore scheduling errors, use single-case selects,
      # and compare times with ==; not worth rewriting in a maintenance fork.
      - path: _test\.go
        linters: [errcheck, staticcheck]
formatters:
  enable:
    - gofmt
    - goimports
